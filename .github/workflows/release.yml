name: Release

# Publishes to npm via OIDC trusted publishing (configured on npmjs.com for
# this repo + workflow). No tokens: GitHub's OIDC identity authenticates the
# publish, and npm generates a signed provenance attestation automatically.
# Trigger by pushing a v* tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing requires npm >= 11.5.1. Pinned to 11: npm
      # 12.0.0's fresh global install is missing its bundled sigstore
      # module, which breaks provenance (v0.4.0 first attempt).
      - run: npm install -g npm@11 && npm --version
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run build
      - run: npm publish
